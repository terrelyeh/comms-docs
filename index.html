<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comms Docs — EnGenius Internal</title>
  <style>
    :root {
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a68;
      --text-muted: #7a7a96;
      --bg-page: #f5f6fa;
      --bg-card: #ffffff;
      --border: #e2e4ea;
      --accent: #2563eb;
      --accent-light: #eff4ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: 17px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px;
    }
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .header .badge {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 17px;
      color: var(--text-muted);
    }
    .doc-list {
      list-style: none;
    }
    .doc-list li {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      transition: box-shadow 0.15s;
    }
    .doc-list li:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .doc-list a {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text-primary);
    }
    .doc-list .icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    .doc-list .info { flex: 1; }
    .doc-list .title {
      font-size: 17px;
      font-weight: 600;
    }
    .doc-list .meta {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .doc-list .arrow {
      color: var(--text-muted);
      font-size: 20px;
    }
    .footer {
      text-align: center;
      padding: 48px 0 0;
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="badge">Internal</span>
      <h1>Comms Docs</h1>
      <p>工作溝通文件彙整</p>
    </div>

    <ul class="doc-list">
      <li>
        <a href="download-monitor-setup-guide.html">
          <span class="icon">📥</span>
          <div class="info">
            <div class="title">檔案下載追蹤方案</div>
            <div class="meta">官網架構現況、GTM/GA4 盤點、追蹤方案比較與建議 — 2026-03-25</div>
          </div>
          <span class="arrow">→</span>
        </a>
      </li>
      <li>
        <a href="wp-cli-setup-guide.html">
          <span class="icon">🔧</span>
          <div class="info">
            <div class="title">WP-CLI + SSH 前置設定指南</div>
            <div class="meta">讓 Claude Code 遠端管理 WordPress 網站的完整設定步驟 — 2026-03-26</div>
          </div>
          <span class="arrow">→</span>
        </a>
      </li>
    </ul>

    <div class="footer">
      EnGenius Technologies — Internal Documents
    </div>
  </div>
</body>
</html>
